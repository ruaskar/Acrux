<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>keymd graph</title>
<script src="/d3.v7.min.js"></script>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 13px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
         background: #0d1117; color: #c9d1d9; overflow: hidden; }
  #wrap { display: flex; height: 100vh; }
  #graph { flex: 1; }
  #panel { width: 380px; border-left: 1px solid #21262d; padding: 16px;
           overflow: auto; background: #0d1117; }
  #panel h2 { font-size: 13px; margin: 0 0 8px; color: #58a6ff; word-break: break-all; }
  #panel pre { white-space: pre-wrap; word-break: break-word; margin: 0;
               font-size: 12px; color: #8b949e; }
  #hint { color: #6e7681; }
  .call { padding: 2px 0; border-bottom: 1px solid #161b22; }
  .call b { color: #d2a8ff; }
  .call .ln { color: #6e7681; float: right; }
  .card { margin: 0 0 14px; }
  .card .lbl { font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
               color: #6e7681; margin: 0 0 4px; }
  .summary { font: 13px/1.55 -apple-system, Segoe UI, sans-serif; color: #c9d1d9;
             background: #161b22; border-left: 2px solid #58a6ff; padding: 8px 10px;
             border-radius: 3px; }
  .sig { font: 12px ui-monospace, monospace; color: #c9d1d9; padding: 3px 0;
         white-space: pre-wrap; word-break: break-word; }
  .sig .kw { color: #ff7b72; } .sig .nm { color: #d2a8ff; }
  .sig .ty { color: #79c0ff; } .sig .ar { color: #ff7b72; }
  .anchor { color: #6e7681; background: #21262d; border-radius: 3px;
            padding: 0 5px; font-size: 10px; margin-left: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; }
  .chip { background: #21262d; border-radius: 10px; padding: 1px 9px; font-size: 11px;
          color: #8b949e; }
  .chip.nav { cursor: pointer; color: #c9d1d9; }
  .chip.nav:hover { background: #1f6feb; color: #fff; }
  .chip.dead { opacity: .45; }
  .sig.hl { background: #1f2937; outline: 1px solid #58a6ff; border-radius: 3px; }
  .sig.rownav { cursor: pointer; border-radius: 3px; }
  .sig.rownav:hover { background: #161b22; }
  .fn { font: 13px ui-monospace, monospace; color: #d2a8ff; margin: 0 0 10px; word-break: break-all; }
  .back { color: #58a6ff; cursor: pointer; }
  .back:hover { text-decoration: underline; }
  .cc { font: 12px ui-monospace, monospace; padding: 3px 4px; color: #8b949e;
        border-bottom: 1px solid #161b22; }
  .cc.nav { cursor: pointer; color: #c9d1d9; }
  .cc.nav:hover { background: #1f6feb; color: #fff; }
  .cc.dead { opacity: .5; }
  .node circle { cursor: pointer; stroke: #0d1117; stroke-width: 1.5px; }
  .node text { fill: #8b949e; font-size: 10px; pointer-events: none; }
  .link { stroke: #30363d; stroke-opacity: 0.7; cursor: pointer; }
  .link.sel { stroke: #d2a8ff; stroke-opacity: 1; }
  .node.sel circle { stroke: #58a6ff; stroke-width: 2.5px; }
  .hulls path.hull, .hulls text.hlab { pointer-events: none; }   /* blobs never block clicks */
  #legend { position: fixed; left: 12px; bottom: 12px; max-width: 300px; max-height: 40vh;
            overflow:auto; background: rgba(13,17,23,0.82); border: 1px solid #21262d;
            border-radius: 8px; padding: 8px 10px; font: 11px ui-monospace, monospace; }
  #legend .row { display: flex; align-items: center; gap: 6px; line-height: 1.7; color: #8b949e;
                 cursor: pointer; user-select: none; border-radius: 3px; padding: 0 3px; }
  #legend .row:hover { background: #161b22; }
  #legend .row.off { opacity: 0.4; text-decoration: line-through; }
  #legend .row.off .sw { background: transparent !important; box-shadow: inset 0 0 0 1.5px currentColor; }
  #legend .sw { width: 10px; height: 10px; border-radius: 2px; flex: 0 0 auto; }
  #legend h3 { font: 600 11px -apple-system, Segoe UI, sans-serif; margin: 0 0 6px; color: #8b949e; }
  #legend .ctl { color: #58a6ff; font-size: 10px; margin: 2px 0 6px; }
  #legend .ctl span { cursor: pointer; } #legend .ctl span:hover { text-decoration: underline; }
  #legend .row .hb { margin-left: auto; flex: 0 0 auto; cursor: pointer; font-size: 11px;
                     line-height: 1; padding: 1px 4px; border-radius: 3px; color: #6e7681; }
  #legend .row .hb:hover { background: #21262d; color: #c9d1d9; }
  #legend .row .hb.on { color: inherit; }        /* hull shown → glyph in folder color */
  #legend .row .hb.muted { opacity: 0.25; }       /* nodes hidden → hull irrelevant, dim ⬡ */
</style>
</head>
<body>
<div id="wrap">
  <svg id="graph"></svg>
  <div id="panel"><h2>keymd graph</h2>
    <p id="hint">Click a <b>node</b> for its .key.md summary &middot; click an <b>edge</b> for the calls crossing it.</p>
  </div>
  <div id="legend"></div>
</div>
<script>
const svg = d3.select("#graph");
const panel = d3.select("#panel");
let W = window.innerWidth - 380, H = window.innerHeight;
svg.attr("width", W).attr("height", H);

svg.append("defs").append("marker")
  .attr("id", "arrow").attr("viewBox", "0 -5 10 10").attr("refX", 22)
  .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
  .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#30363d");

const root = svg.append("g");
const zoomB = d3.zoom().scaleExtent([0.15, 4]).on("zoom", e => root.attr("transform", e.transform));
svg.call(zoomB);

let GRAPH = null;   // {byId, links, node, link, sim, modmap} — set once /api/graph loads

function esc(s) { return String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function escAttr(s) {        // escape for an HTML attribute value (quotes too) — chips carry
  return String(s).replace(/[&<>"']/g, c =>     // file paths + symbol names in data-* attrs
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function hl(sig) {           // lightweight signature syntax highlight (escaped first)
  let s = esc(sig);
  s = s.replace(/\b(def|class|async|return)\b/g, '<span class="kw">$1</span>');
  s = s.replace(/(-&gt;)/g, '<span class="ar">$1</span>');
  s = s.replace(/\b([A-Z][A-Za-z0-9_]*)\b/g, '<span class="ty">$1</span>');
  return s;
}

function splitAnchor(line) {            // "  def f() -> X  # L14-19" → [sig, "L14-19"|""]
  const m = line.match(/^(.*?)\s*#\s*(L\d+(?:-\d+)?)\s*$/);
  return m ? [m[1].trim(), m[2]] : [line.trim(), ""];
}

function sigName(sig) {                 // "def canonical(p) -> str" → "canonical"
  const m = sig.match(/(?:def|class)\s+([A-Za-z0-9_]+)/);
  return m ? m[1] : "";
}

function folderOf(id) {                 // file id → readable top folder label for grouping
  const segs = id.split(/[/\\]/);       // ids use OS separators (/ on posix, \ on windows)
  segs.pop();                           // drop the filename
  while (segs.length && (segs[0] === "src" || segs[0] === "lib"))
    segs.shift();                       // strip a conventional source prefix so engine/proxy surface
  if (!segs.length) return "(root)";    // a top-level file (README.md, etc.)
  return segs[segs.length - 1];         // the immediate containing dir (tail=1: engine, proxy, parsers…)
}

let FOLDER_COLOR = null;                // d3.scaleOrdinal(folder → color), set once nodes load

function buildModMap(nodes) {           // dotted module path → file id (all path tails)
  const m = {};
  for (const n of nodes) {
    const segs = n.id.split(/[/\\]/);
    segs[segs.length - 1] = segs[segs.length - 1].replace(/\.[^.]+$/, "");
    for (let i = 0; i < segs.length; i++) {
      const key = segs.slice(i).join(".");
      if (!(key in m)) m[key] = n.id;   // keep first; lookup tries longest prefix first
    }
  }
  return m;
}

function resolveDep(dep) {              // import name → {file, sym} | null (stdlib/external)
  const parts = dep.replace(/^\.+/, "").split(".");
  for (let k = parts.length; k > 0; k--) {
    const pref = parts.slice(0, k).join(".");
    if (GRAPH && GRAPH.modmap[pref])
      return { file: GRAPH.modmap[pref], sym: parts.slice(k).join(".") };
  }
  return null;
}

function navigateTo(fileId, sym) {      // chip click: focus the target file node + its fn
  if (!GRAPH) return;
  const d = GRAPH.byId[fileId];
  if (!d) return;
  GRAPH.node.classed("sel", false);
  GRAPH.node.filter(n => n.id === fileId).classed("sel", true);
  GRAPH.link.classed("sel", false);
  if (d.x != null && d.y != null) {     // pan+zoom to center the node (sim has positioned it)
    const k = 1.3;
    svg.transition().duration(600).call(
      zoomB.transform, d3.zoomIdentity.translate(W / 2 - d.x * k, H / 2 - d.y * k).scale(k));
  }
  showSummary(d, sym);                  // load its panel, highlighting the called symbol
}

function renderSummary(d, text, highlightSym) {
  const lines = text.split("\n");
  const get = pfx => { const l = lines.find(x => x.startsWith(pfx)); return l ? l.slice(pfx.length).trim() : ""; };
  // api: block = indented lines between "api:" and the next top-level key
  const api = [];
  let inApi = false;
  for (const l of lines) {
    if (l === "api:") { inApi = true; continue; }
    if (inApi) { if (/^\S/.test(l)) break; if (l.trim() && l.trim() !== "(none)") api.push(l); }
  }
  const summary = get("summary:");
  const deps = get("deps:"), calls = get("calls:");
  let html = `<h2>${esc(d.id)}</h2>`;
  html += `<div class="chips"><span class="chip">${esc(d.loc)} loc</span>` +
          `<span class="chip">called by ${esc(d.called_by)}</span></div>`;
  if (summary) html += `<div class="card"><div class="lbl">summary</div>` +
                       `<div class="summary">${esc(summary)}</div></div>`;
  if (api.length) {
    html += `<div class="card"><div class="lbl">inputs &amp; outputs</div>`;
    for (const a of api) { const [sig, anc] = splitAnchor(a); const nm = sigName(sig);
      html += `<div class="sig${nm ? " rownav" : ""}" data-sym="${escAttr(nm)}">${hl(sig)}` +
              `${anc ? `<span class="anchor">${anc}</span>` : ""}</div>`; }
    html += `</div>`;
  }
  // calls: each callee name → the file it resolves to (from this node's outgoing edges),
  // so the chip navigates to that file + highlights the function. A name resolving to >1
  // file is AMBIGUOUS → dead chip (don't guess a wrong destination). Unresolved → dead too.
  const callMap = {};                   // to_name → target file id (null = ambiguous)
  for (const e of (GRAPH ? GRAPH.links.filter(l => (l.source.id || l.source) === d.id) : []))
    for (const c of (e.calls || [])) {
      const tgt = (e.target.id || e.target);
      if (c.to_name in callMap && callMap[c.to_name] !== tgt) callMap[c.to_name] = null;
      else if (!(c.to_name in callMap)) callMap[c.to_name] = tgt;
    }
  const callChip = name => {
    const f = callMap[name];
    return f ? `<span class="chip nav" data-file="${escAttr(f)}" data-sym="${escAttr(name)}">${esc(name)}</span>`
             : `<span class="chip dead">${esc(name)}</span>`;
  };
  const depChip = dep => {
    const r = resolveDep(dep);
    return r ? `<span class="chip nav" data-file="${escAttr(r.file)}" data-sym="${escAttr(r.sym)}">${esc(dep)}</span>`
             : `<span class="chip dead">${esc(dep)}</span>`;
  };
  const card = (lbl, csv, mk) => csv && csv !== "(none)" ?
    `<div class="card"><div class="lbl">${lbl}</div><div class="chips">` +
    csv.split(",").map(x => mk(x.trim())).filter(Boolean).join("") + `</div></div>` : "";
  html += card("dependencies", deps, depChip) + card("calls", calls, callChip);
  panel.html(html);

  // bind chip navigation + apply the requested function highlight
  panel.selectAll(".chip.nav").on("click", function (ev) {
    ev.stopPropagation();
    navigateTo(this.getAttribute("data-file"), this.getAttribute("data-sym"));
  });
  // clicking a function/class row opens its per-function detail view
  panel.selectAll(".sig.rownav").on("click", function (ev) {
    ev.stopPropagation();
    showSymbol(d.id, this.getAttribute("data-sym"));
  });
  if (highlightSym) {
    const row = panel.selectAll(".sig").filter(function () {
      return this.getAttribute("data-sym") === highlightSym; });
    if (!row.empty()) {
      row.classed("hl", true);
      row.node().scrollIntoView({ block: "center", behavior: "smooth" });
    }
  }
}

function showSummary(d, highlightSym) {
  panel.html(`<h2>${esc(d.id)}</h2><p id="hint">loading…</p>`);
  fetch("/api/summary?path=" + encodeURIComponent(d.id))
    .then(r => r.json())
    .then(j => renderSummary(d, j.summary || "", highlightSym))
    .catch(() => panel.html(`<h2>${esc(d.id)}</h2><p id="hint">(failed to load)</p>`));
}

let CUR_FILE = null;   // the file whose function is shown (for same-file detection)

function ccCard(label, items, kind) {     // kind: 'caller' | 'callee'
  if (!items.length)
    return `<div class="card"><div class="lbl">${label}</div>` +
           `<div class="cc dead">none</div></div>`;
  const rows = items.map(it => {
    const file = it.file, sym = kind === "caller" ? it.fn : it.name;
    const nav = file && file !== CUR_FILE ? file : null;   // same-file/stdlib → not navigable
    const text = kind === "caller" ? `${esc(it.file)}  ${esc(it.fn)}`
                                   : `${esc(it.name)}${file ? `  ${esc(file)}` : ""}`;
    return nav
      ? `<div class="cc nav" data-file="${escAttr(nav)}" data-sym="${escAttr(sym)}">${text}</div>`
      : `<div class="cc">${text}</div>`;
  }).join("");
  return `<div class="card"><div class="lbl">${label}</div>${rows}</div>`;
}

function showSymbol(fileId, name) {
  CUR_FILE = fileId;
  panel.html(`<p id="hint">loading…</p>`);
  fetch(`/api/symbol?path=${encodeURIComponent(fileId)}&name=${encodeURIComponent(name)}`)
    .then(r => r.json())
    .then(j => {
      const backH = `<h2><span class="back" data-file="${escAttr(fileId)}">← ${esc(fileId)}</span></h2>`;
      if (j.error === "ambiguous symbol") {     // >1 method shares this leaf → let user pick
        let hh = backH + `<div class="fn">${esc(j.name)} — which one?</div>`;
        hh += j.candidates.map(c =>
          `<div class="cc nav" data-file="${escAttr(fileId)}" data-pick="${escAttr(c.name)}">` +
          `${esc(c.name)}<span class="anchor">L${c.line}</span></div>`).join("");
        panel.html(hh);
        panel.select(".back").on("click", function (ev) { ev.stopPropagation();
          const d = GRAPH && GRAPH.byId[this.getAttribute("data-file")]; if (d) showSummary(d); });
        panel.selectAll(".cc.nav").on("click", function (ev) { ev.stopPropagation();
          showSymbol(this.getAttribute("data-file"), this.getAttribute("data-pick")); });
        return;
      }
      if (j.error) { panel.html(`${backH}<p id="hint">${esc(j.error)}</p>`); return; }
      let h = backH;
      h += `<div class="fn">${esc(j.name)}</div>`;
      if (j.doc) h += `<div class="card"><div class="lbl">summary</div>` +
                      `<div class="summary">${esc(j.doc)}</div></div>`;
      h += `<div class="card"><div class="lbl">signature (in / out)</div>` +
           `<div class="sig">${hl(j.signature || "")}` +
           `${j.line ? `<span class="anchor">L${j.line}-${j.end_line || j.line}</span>` : ""}</div></div>`;
      h += ccCard("called by (upstream)", j.callers || [], "caller");
      h += ccCard("calls (downstream)", j.callees || [], "callee");
      panel.html(h);
      panel.select(".back").on("click", function (ev) {
        ev.stopPropagation();
        const d = GRAPH && GRAPH.byId[this.getAttribute("data-file")];
        if (d) showSummary(d);
      });
      panel.selectAll(".cc.nav").on("click", function (ev) {
        ev.stopPropagation();
        navigateTo(this.getAttribute("data-file"), this.getAttribute("data-sym"));
      });
    })
    .catch(() => panel.html(`<p id="hint">(failed to load symbol)</p>`));
}

function showEdge(e) {
  const src = e.source.id || e.source, tgt = e.target.id || e.target;
  const calls = (e.calls || []).map(c =>
    `<div class="call"><b>${esc(c.from_name)}</b> → ${esc(c.to_name)}<span class="ln">L${c.line}</span></div>`).join("");
  panel.html(`<h2>${esc(src)} → ${esc(tgt)}</h2>` +
             `<p id="hint">${(e.calls || []).length} call(s) crossing this edge</p>${calls}`);
}

fetch("/api/graph").then(r => r.json()).then(g => {
  const nodes = g.nodes;
  const links = g.edges.map(e => ({ source: e.from, target: e.to, calls: e.calls }));
  const maxCb = d3.max(nodes, n => n.called_by) || 1;
  const r = d3.scaleSqrt().domain([0, maxCb]).range([5, 26]);

  // --- folder grouping: tag each node, build a stable color + a cluster anchor ---
  nodes.forEach(n => { n.folder = folderOf(n.id); });
  const folders = Array.from(new Set(nodes.map(n => n.folder))).sort();
  FOLDER_COLOR = d3.scaleOrdinal().domain(folders)
    .range(folders.map((_, i) => d3.interpolateRainbow(i / Math.max(folders.length, 1))));
  // a deterministic anchor per folder on a ring → same-folder nodes get pulled together
  const anchor = {};
  folders.forEach((f, i) => {
    const a = (i / folders.length) * 2 * Math.PI;
    anchor[f] = { x: W / 2 + Math.cos(a) * Math.min(W, H) * 0.32,
                  y: H / 2 + Math.sin(a) * Math.min(W, H) * 0.32 };
  });

  const linkForce = d3.forceLink(links).id(d => d.id).distance(90);
  const sim = d3.forceSimulation(nodes)
    .force("link", linkForce)
    .force("charge", d3.forceManyBody().strength(-260))
    .force("center", d3.forceCenter(W / 2, H / 2))
    // mild folder clustering — kept weak so the call links still shape local layout
    .force("fx", d3.forceX(d => anchor[d.folder].x).strength(0.09))
    .force("fy", d3.forceY(d => anchor[d.folder].y).strength(0.09))
    .force("collide", d3.forceCollide().radius(d => r(d.called_by) + 4));

  // hull layer FIRST so folder blobs render behind links + nodes
  const hullLayer = root.append("g").attr("class", "hulls");

  const link = root.append("g").selectAll("line").data(links).join("line")
    .attr("class", "link").attr("marker-end", "url(#arrow)")
    .on("click", (ev, d) => { ev.stopPropagation();
      link.classed("sel", false); d3.select(ev.currentTarget).classed("sel", true);
      node.classed("sel", false); showEdge(d); });

  const node = root.append("g").selectAll("g").data(nodes).join("g").attr("class", "node")
    .call(d3.drag()
      .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
      .on("end", (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("click", (ev, d) => { ev.stopPropagation();
      node.classed("sel", false); d3.select(ev.currentTarget).classed("sel", true);
      link.classed("sel", false); showSummary(d); });

  node.append("circle").attr("r", d => r(d.called_by))
    .attr("fill", d => FOLDER_COLOR(d.folder));   // color by folder (size still = centrality)
  node.append("title").text(d => d.id);
  node.append("text").attr("x", d => r(d.called_by) + 3).attr("dy", "0.32em")
    .text(d => d.id.split(/[/\\]/).pop());

  // group node positions by folder; convex hull (≥3 pts) padded, else a circle blob
  const byFolder = {};
  for (const n of nodes) (byFolder[n.folder] = byFolder[n.folder] || []).push(n);
  const hidden = new Set();              // folders whose NODES are toggled off (row click)
  const hullHidden = new Set();          // folders whose HULL overlay is toggled off (⬡ button)

  function drawHulls() {
    // a hull shows only if the folder's nodes are visible AND its hull isn't toggled off
    const data = folders.filter(f => !hidden.has(f) && !hullHidden.has(f)).map(f => {
      const pts = byFolder[f].map(n => [n.x, n.y]);
      // polygonHull returns null for <3 pts AND a degenerate 2-point array for ≥3
      // COLLINEAR pts (common transiently while the force settles) — both must fall
      // back to the circle path, else polygonCentroid([2 pts]) → [null,null] → NaN path.
      let hull = pts.length >= 3 ? d3.polygonHull(pts) : null;
      if (hull && hull.length < 3) hull = null;
      return { folder: f, pts, hull,
               cx: d3.mean(pts, p => p[0]), cy: d3.mean(pts, p => p[1]) };
    });
    const PAD = 26;
    // outline path: padded convex hull, or a padded circle for tiny folders
    const blobs = hullLayer.selectAll("path.hull").data(data, d => d.folder);
    blobs.join("path").attr("class", "hull")
      .attr("fill", d => FOLDER_COLOR(d.folder)).attr("fill-opacity", 0.07)
      .attr("stroke", d => FOLDER_COLOR(d.folder)).attr("stroke-opacity", 0.5)
      .attr("stroke-width", 1.5).attr("stroke-linejoin", "round")
      .attr("d", d => {
        if (d.hull) {                                    // expand hull outward by PAD
          const c = d3.polygonCentroid(d.hull);
          const ex = d.hull.map(([x, y]) => {
            const dx = x - c[0], dy = y - c[1], L = Math.hypot(dx, dy) || 1;
            return [x + dx / L * PAD, y + dy / L * PAD];
          });
          return "M" + ex.map(p => p.join(",")).join("L") + "Z";
        }
        const r2 = (d.pts.length === 2                   // padded circle for 1–2 node folders
          ? d3.max(d.pts, p => Math.hypot(p[0] - d.cx, p[1] - d.cy)) : 0) + PAD;
        return `M ${d.cx - r2},${d.cy} a ${r2},${r2} 0 1,0 ${2 * r2},0 a ${r2},${r2} 0 1,0 ${-2 * r2},0`;
      });
    // folder name label near the blob's top
    const labs = hullLayer.selectAll("text.hlab").data(data, d => d.folder);
    labs.join("text").attr("class", "hlab")
      .attr("x", d => d.cx).attr("y", d => d3.min(d.pts, p => p[1]) - PAD - 4)
      .attr("text-anchor", "middle").attr("fill", d => FOLDER_COLOR(d.folder))
      .attr("font-size", "11px").attr("font-weight", "600")
      .attr("opacity", 0.85).text(d => d.folder);
  }

  // Re-run the layout over only the VISIBLE folders: hidden folders' nodes + any
  // edge touching them drop out of both the DOM and the force sim, so the rest
  // actually spreads out instead of just hiding behind invisible weight.
  function applyFilter() {
    const vis = n => !hidden.has(n.folder);
    const visNodes = nodes.filter(vis);
    const visLinks = links.filter(l =>
      vis(typeof l.source === "object" ? l.source : byId[l.source]) &&
      vis(typeof l.target === "object" ? l.target : byId[l.target]));
    node.style("display", d => vis(d) ? null : "none");
    link.style("display", d => {
      const s = typeof d.source === "object" ? d.source : byId[d.source];
      const t = typeof d.target === "object" ? d.target : byId[d.target];
      return (vis(s) && vis(t)) ? null : "none";
    });
    sim.nodes(visNodes);
    linkForce.links(visLinks);
    sim.alpha(0.5).restart();
  }

  sim.on("tick", () => {
    drawHulls();
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // folder legend (sorted by file count, descending). Each row TOGGLES its folder
  // in/out of the visualization — click `tests` off and the rest breathes.
  const counts = folders.map(f => ({ f, n: byFolder[f].length }))
    .sort((a, b) => b.n - a.n);
  const leg = d3.select("#legend");
  leg.html(`<h3>folders (${folders.length})</h3>`);
  leg.append("div").attr("class", "ctl")
     .html('<span>row</span> = files · <span>⬡</span> = grouping');
  const ctl2 = leg.append("div").attr("class", "ctl");
  ctl2.append("span").text("all files").on("click",
    () => { hidden.clear(); syncLegend(); applyFilter(); });
  ctl2.append("span").text("  ·  no files").on("click",
    () => { folders.forEach(f => hidden.add(f)); syncLegend(); applyFilter(); });
  ctl2.append("span").text("  ·  all ⬡").on("click",
    () => { hullHidden.clear(); syncLegend(); drawHulls(); });
  ctl2.append("span").text("  ·  no ⬡").on("click",
    () => { folders.forEach(f => hullHidden.add(f)); syncLegend(); drawHulls(); });
  const rows = {};
  for (const { f, n } of counts) {
    const row = leg.append("div").attr("class", "row").attr("title", `${f}: click to hide files`);
    row.append("span").attr("class", "sw").style("background", FOLDER_COLOR(f));
    row.append("span").text(`${f} · ${n}`);
    // per-folder HULL toggle (the colored blob/grouping) — independent of the node toggle
    row.append("span").attr("class", "hb").style("color", FOLDER_COLOR(f)).text("⬡")
      .on("click", (ev) => {
        ev.stopPropagation();                       // don't also fire the row's node-toggle
        if (hullHidden.has(f)) hullHidden.delete(f); else hullHidden.add(f);
        syncLegend(); drawHulls();
      });
    row.on("click", () => {                          // row body = toggle this folder's NODES
      if (hidden.has(f)) hidden.delete(f); else hidden.add(f);
      syncLegend(); applyFilter();
    });
    rows[f] = row;
  }
  function syncLegend() {
    for (const f of folders) {
      const nodesOff = hidden.has(f), hullOff = hullHidden.has(f);
      rows[f].classed("off", nodesOff);
      // a hull only actually renders when the folder's NODES are visible AND its hull
      // isn't toggled off — so the ⬡ reflects REAL visibility, not just the hullHidden flag.
      const hullShown = !nodesOff && !hullOff;
      rows[f].select(".hb")
        .classed("on", hullShown)
        .classed("muted", nodesOff)          // nodes gone → ⬡ is irrelevant, dim it
        .attr("title", nodesOff ? `${f} files hidden — show the row first`
                                : (hullOff ? "show" : "hide") + ` ${f} grouping`);
    }
  }

  syncLegend();   // set initial ⬡ titles/classes (all folders shown by default)

  // shared state for the panel's chip navigation (resolve names → file nodes)
  const byId = {};
  for (const n of nodes) byId[n.id] = n;
  GRAPH = { byId, links, node, link, sim, modmap: buildModMap(nodes) };
});

window.addEventListener("resize", () => {
  W = window.innerWidth - 380; H = window.innerHeight;
  svg.attr("width", W).attr("height", H);
});
</script>
</body>
</html>
