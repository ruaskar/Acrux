name: binary

# Builds the self-contained keymd binary (PyApp) for every platform, smoke-tests its
# first-run install, and on a NEW version cuts a GitHub Release with the binaries +
# SHA256SUMS — so `install.sh`/`install.ps1` and `keymd update` always resolve to it.
#
# Release is AUTOMATIC: bump `keymd.__version__`, merge to master, and if a release for
# that version does not already exist this workflow builds it and publishes the release.
# It is idempotent (a master push that doesn't change the version is a no-op past `check`).
# Pushing a `v*` tag manually still works as a fallback.
on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write          # create the tag/release + attach assets

concurrency:
  group: binary-release
  cancel-in-progress: false   # never interrupt an in-flight release

jobs:
  check:
    name: release needed?
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.decide.outputs.version }}
      should_release: ${{ steps.decide.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
      - id: decide
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_TYPE:-branch}" = "tag" ]; then
            # Manual fallback: a pushed v* tag always releases that exact version.
            version="${GITHUB_REF_NAME#v}"
            echo "tag push -> release v$version"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            version="$(python3 -c 'import re; print(re.search(r"""__version__\s*=\s*["\x27]([^"\x27]+)""", open("src/keymd/__init__.py").read()).group(1))')"
            if gh release view "v$version" >/dev/null 2>&1; then
              echo "release v$version already exists -> nothing to do"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            else
              echo "no release for v$version yet -> build + publish"
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build Linux on the OLDEST supported runner glibc (22.04 = 2.35) so the
          # binary runs on glibc >= 2.35 (Debian 12, Ubuntu 22.04+, …). ubuntu-latest
          # (24.04 = 2.39) would refuse to run on most current systems.
          - { os: ubuntu-22.04,   target: linux-x86_64,   exe: "" }
          - { os: macos-14,       target: macos-aarch64,  exe: "" }
          - { os: windows-latest, target: windows-x86_64, exe: ".exe" }
          # macos-x86_64 (Intel) dropped: GitHub's macos-13 runners queue-stall and
          # would block the release. Apple Silicon (macos-14) covers Macs since 2020;
          # Intel-Mac users install via pip/uvx. Re-add via a self-hosted runner later.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Build binary
        shell: bash
        run: bash packaging/build_binary.sh

      - name: Smoke test (first-run install + index a fixture)
        shell: bash
        run: |
          bin="$PWD/dist/keymd${{ matrix.exe }}"
          tmp="$(mktemp -d)"
          printf 'def f():\n    return 1\n' > "$tmp/a.py"
          ( cd "$tmp" && "$bin" build && "$bin" stats )

      - name: Verify --version + self-update wiring
        shell: bash
        run: |
          bin="$PWD/dist/keymd${{ matrix.exe }}"
          "$bin" --version
          out="$("$bin" update 2>&1 || true)"; echo "$out"
          # must not crash with a traceback
          if echo "$out" | grep -qi "traceback"; then echo "FAIL: update crashed"; exit 1; fi
          # PYAPP_PASS_LOCATION must be wired: `update` should reach the release check
          # (no release yet -> 'could not reach'), NOT bail with 'binary distribution only'.
          if echo "$out" | grep -qi "binary distribution only"; then
            echo "FAIL: PYAPP/PASS_LOCATION not passing the launcher path"; exit 1; fi
          echo "self-update wiring OK"

      - name: Verify zero-Python (Linux, container with NO python)
        if: matrix.target == 'linux-x86_64'
        shell: bash
        run: |
          tmp="$(mktemp -d)"; printf 'def f():\n    return 1\n' > "$tmp/a.py"
          docker run --rm -v "$PWD/dist:/d:ro" -v "$tmp:/w" -w /w debian:bookworm-slim bash -c '
            set -e
            apt-get update -qq && apt-get install -y -qq ca-certificates >/dev/null   # HTTPS to PyPI; NOT python
            if command -v python || command -v python3; then echo "system python present — proof invalid"; exit 1; fi
            /d/keymd build && /d/keymd stats'

      - name: Stage release asset
        shell: bash
        run: |
          mkdir -p out
          cp "dist/keymd${{ matrix.exe }}" "out/keymd-${{ matrix.target }}${{ matrix.exe }}"
          ls -la out

      - uses: actions/upload-artifact@v4
        with:
          name: keymd-${{ matrix.target }}
          path: out/keymd-${{ matrix.target }}${{ matrix.exe }}
          if-no-files-found: error

  release:
    name: release v${{ needs.check.outputs.version }}
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - run: ls -R artifacts
      - name: Checksums (keymd update verifies against these)
        run: cd artifacts && sha256sum keymd-* > SHA256SUMS && cat SHA256SUMS
      - name: Publish release (creates the tag from this commit if needed)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          target_commitish: ${{ github.sha }}
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
