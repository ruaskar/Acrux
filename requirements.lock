# requirements.lock — exact, known-good versions of keymd's optional runtime deps.
#
# WHY THIS FILE EXISTS: keymd's pyproject declares only lower bounds (e.g.
# starlette>=0.37). On a fresh machine pip's resolver can wander an enormous
# version space (starlette alone has ~195 releases above that floor) and
# backtrack for a long time — the "install hangs / loops" symptom. These pins
# are the versions keymd's test suite (253 tests) actually passes on.
#
# USE IT to get a deterministic, fast install (no backtracking):
#   pip install -c requirements.lock -e ".[all]"        # editable dev install
#   pip install -c requirements.lock "keymd[all] @ git+https://github.com/ruaskar/keymd"
#
# The `-c` (constraints) form pins versions WITHOUT itself selecting extras, so
# you still choose which extras to install. Regenerate after a deliberate bump:
#   python -m pip freeze | grep -iE '^(httpx|starlette|uvicorn|watchdog|tree-sitter|pypdf|python-docx)'
#
# keymd's own engine has ZERO required dependencies; everything here is an EXTRA.

# --- proxy extra (httpx + starlette + uvicorn) ---
httpx==0.28.1
starlette==1.0.0
uvicorn==0.44.0

# --- watch extra ---
watchdog==6.0.0

# --- lang extra (JS/TS + Java/C/C++ via tree-sitter) ---
tree-sitter==0.25.2
tree-sitter-javascript==0.25.0
tree-sitter-typescript==0.23.2
tree-sitter-java==0.23.5
tree-sitter-c==0.24.2
tree-sitter-cpp==0.23.4

